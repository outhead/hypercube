<!DOCTYPE html>
<html lang="en" class="lenis">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hypercube</title>

  <!-- GSAP 3.13.0 + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

  <!-- Lenis 1.0.42 -->
  <script src="https://unpkg.com/lenis@1.0.42/dist/lenis.min.js"></script>

  <!-- Three.js r172 importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.172.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #000;
      color: #fff;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    html.lenis, html.lenis body { height: auto; }
    .lenis.lenis-smooth { scroll-behavior: auto; }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* =====================================================
       CONSTRUCTOR PANEL
    ===================================================== */

    /* Gear toggle button */
    #panel-toggle {
      position: fixed;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      z-index: 1001;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(212,156,77,0.4);
      background: rgba(10,10,10,0.85);
      color: #d49c4d;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: right 0.35s ease, opacity 0.25s ease, background 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      line-height: 1;
      padding: 0;
    }
    #panel-toggle:hover {
      background: rgba(212,156,77,0.15);
    }
    #panel-toggle.panel-open {
      right: 336px;
    }
    #panel-toggle.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Mobile: settings button moves to top-right corner. */
    @media (max-width: 768px) {
      #panel-toggle {
        top: 16px;
        right: 16px;
        transform: none;
      }
      #panel-toggle.panel-open {
        right: 336px;
      }
    }

    /* Sidebar panel */
    #constructor-panel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 320px;
      height: 100vh;
      z-index: 1000;
      background: rgba(10,10,10,0.95);
      border-left: 1px solid rgba(212,156,77,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: right 0.35s ease;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    #constructor-panel.open {
      right: 0;
    }

    /* Panel header */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .panel-title {
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* Mode buttons (Controls / Learn) */
    .panel-modes {
      display: flex;
      gap: 4px;
    }
    .panel-mode-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      font-family: sans-serif;
      cursor: pointer;
      padding: 4px 10px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .panel-mode-btn.active {
      background: rgba(212,156,77,0.18);
      border-color: rgba(212,156,77,0.5);
      color: #d49c4d;
    }

    /* Action buttons (play + close) */
    .panel-actions {
      display: flex;
      gap: 6px;
    }
    .panel-action-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 16px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .panel-action-btn:hover {
      color: #d49c4d;
    }

    /* Scrollable body */
    #panel-controls,
    #panel-learn {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(212,156,77,0.2) transparent;
    }
    #panel-controls::-webkit-scrollbar,
    #panel-learn::-webkit-scrollbar {
      width: 4px;
    }
    #panel-controls::-webkit-scrollbar-thumb,
    #panel-learn::-webkit-scrollbar-thumb {
      background: rgba(212,156,77,0.2);
      border-radius: 2px;
    }

    /* Accordion */
    .accordion-section {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      cursor: pointer;
      user-select: none;
      font-family: sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      transition: color 0.2s;
    }
    .accordion-header:hover {
      color: #d49c4d;
    }
    .accordion-arrow {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      transition: transform 0.25s ease;
    }
    .accordion-section.open .accordion-arrow {
      transform: rotate(180deg);
    }
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .accordion-section.open .accordion-body {
      max-height: 1200px;
    }
    .accordion-body-inner {
      padding: 4px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Controls */
    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ctrl-label {
      font-family: sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
      min-width: 80px;
    }
    .ctrl-value {
      font-family: monospace;
      font-size: 10px;
      color: rgba(212,156,77,0.8);
      min-width: 36px;
      text-align: right;
      flex-shrink: 0;
    }
    .ctrl-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.12);
      outline: none;
      cursor: pointer;
      accent-color: #d49c4d;
    }
    .ctrl-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d49c4d;
      cursor: pointer;
      border: none;
    }
    .ctrl-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d49c4d;
      cursor: pointer;
      border: none;
    }
    .ctrl-select {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      font-family: sans-serif;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }
    .ctrl-select:focus {
      border-color: rgba(212,156,77,0.5);
    }
    .ctrl-color {
      width: 32px;
      height: 22px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      cursor: pointer;
      padding: 0;
      background: none;
    }
    .ctrl-toggle {
      position: relative;
      width: 32px;
      height: 17px;
      flex-shrink: 0;
    }
    .ctrl-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .ctrl-toggle-track {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ctrl-toggle input:checked + .ctrl-toggle-track {
      background: rgba(212,156,77,0.55);
    }
    .ctrl-toggle-track::after {
      content: '';
      position: absolute;
      width: 11px;
      height: 11px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .ctrl-toggle input:checked + .ctrl-toggle-track::after {
      transform: translateX(15px);
    }
    .ctrl-subsection {
      font-family: sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
      margin-bottom: 2px;
    }
    .ctrl-dropzone {
      border: 1px dashed rgba(212,156,77,0.3);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
      font-family: sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .ctrl-dropzone:hover {
      border-color: rgba(212,156,77,0.6);
      color: rgba(255,255,255,0.6);
    }

    /* Export button (bottom of panel) */
    .panel-export-btn {
      flex-shrink: 0;
      margin: 10px 16px 14px;
      padding: 9px 0;
      background: rgba(212,156,77,0.12);
      border: 1px solid rgba(212,156,77,0.35);
      border-radius: 6px;
      color: #d49c4d;
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .panel-export-btn:hover {
      background: rgba(212,156,77,0.22);
    }

    /* Learn mode */
    .learn-block {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .learn-block h4 {
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d49c4d;
      margin-bottom: 6px;
    }
    .learn-block p {
      font-family: sans-serif;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.55);
    }
    .learn-hidden {
      display: none;
    }
    .learn-topic {
      padding: 14px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .learn-topic-main {
      font-family: sans-serif;
      font-size: 12.5px;
      line-height: 1.65;
      color: rgba(255,255,255,0.72);
      margin-bottom: 10px;
    }
    .learn-topic-main code {
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 11.5px;
      color: #f0c074;
      background: rgba(212,156,77,0.08);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .learn-where {
      font-family: sans-serif;
      font-size: 11.5px;
      line-height: 1.55;
      color: rgba(255,255,255,0.5);
      font-style: italic;
      border-left: 2px solid #d49c4d;
      padding: 4px 0 4px 10px;
      margin-top: 8px;
    }
    .learn-where b {
      font-style: normal;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #d49c4d;
      text-transform: uppercase;
      font-size: 10.5px;
      display: block;
      margin-bottom: 3px;
    }

    /* Export modal */
    #export-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }
    #export-modal.open {
      display: flex;
    }
    .export-content {
      background: rgba(14,14,14,0.98);
      border: 1px solid rgba(212,156,77,0.25);
      border-radius: 10px;
      width: min(780px, 94vw);
      max-height: 84vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Panels for the 4 Export tabs */
    .export-panel {
      font-family: sans-serif;
      font-size: 12.5px;
      line-height: 1.6;
      color: rgba(255,255,255,0.78);
    }
    .export-panel h4 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d49c4d;
      margin: 14px 0 6px;
    }
    .export-panel h4:first-child { margin-top: 0; }
    .export-panel p { margin: 0 0 8px; }
    .export-panel code {
      font-family: monospace;
      font-size: 11.5px;
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
      color: #f0c187;
    }
    .export-panel ul {
      list-style: none;
      padding: 0;
      margin: 0 0 10px;
    }
    .export-panel ul li {
      padding: 4px 0 4px 14px;
      position: relative;
      font-size: 12px;
    }
    .export-panel ul li::before {
      content: "\25B8";
      position: absolute;
      left: 0;
      color: rgba(212,156,77,0.6);
    }
    .effect-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .effect-card h5 {
      font-size: 12.5px;
      font-weight: 700;
      color: #f0c187;
      margin: 0 0 6px;
      letter-spacing: 0.03em;
    }
    .effect-card .effect-what { color: rgba(255,255,255,0.82); margin-bottom: 6px; }
    .effect-card .effect-why,
    .effect-card .effect-where {
      font-size: 11.5px;
      color: rgba(255,255,255,0.55);
      margin: 2px 0;
    }
    .effect-card .effect-why strong,
    .effect-card .effect-where strong {
      color: rgba(212,156,77,0.75);
      font-weight: 600;
      margin-right: 4px;
    }
    .export-sf-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .export-sf-generate {
      background: rgba(212,156,77,0.18);
      border: 1px solid rgba(212,156,77,0.45);
      color: #d49c4d;
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
    }
    .export-sf-generate:hover { background: rgba(212,156,77,0.28); }
    .export-sf-generate:disabled { opacity: 0.5; cursor: wait; }
    .export-sf-progress {
      font-family: monospace;
      font-size: 11.5px;
      color: rgba(255,255,255,0.55);
    }
    .export-sf-out {
      width: 100%;
      min-height: 220px;
      max-height: 45vh;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255,255,255,0.7);
      resize: vertical;
    }
    .export-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .export-header h3 {
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }
    .export-close-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    .export-close-btn:hover { color: #fff; }
    .export-tabs {
      display: flex;
      gap: 0;
      padding: 10px 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .export-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 14px 8px;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .export-tab.active {
      color: #d49c4d;
      border-bottom-color: #d49c4d;
    }
    .export-code {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(212,156,77,0.2) transparent;
    }
    .export-code pre {
      font-family: monospace;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
      white-space: pre-wrap;
      word-break: break-all;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      padding: 12px;
    }
    .export-actions {
      display: flex;
      gap: 10px;
      padding: 12px 20px 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .export-copy,
    .export-download {
      flex: 1;
      padding: 8px 0;
      border-radius: 5px;
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .export-copy {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
    }
    .export-copy:hover { background: rgba(255,255,255,0.12); }
    .export-download {
      background: rgba(212,156,77,0.18);
      border: 1px solid rgba(212,156,77,0.45);
      color: #d49c4d;
    }
    .export-download:hover { background: rgba(212,156,77,0.28); }
  </style>
</head>
<body>
  <!-- Constructor panel gear toggle -->
  <button id="panel-toggle" title="Open Constructor">&#9881;</button>

  <!-- Constructor sidebar panel -->
  <aside id="constructor-panel">
    <div class="panel-header">
      <span class="panel-title">Constructor</span>
      <div class="panel-modes">
        <button class="panel-mode-btn active" data-mode="controls" onclick="setPanelMode('controls')">Controls</button>
        <button class="panel-mode-btn" data-mode="learn" onclick="setPanelMode('learn')">Learn</button>
      </div>
      <div class="panel-actions">
        <button class="panel-action-btn" id="btn-presentation" title="Presentation mode" onclick="startPresentation()">&#9654;</button>
        <button class="panel-action-btn" id="btn-close-panel" title="Close panel" onclick="togglePanel()">&#10005;</button>
      </div>
    </div>

    <!-- Controls mode -->
    <div id="panel-controls">

      <!-- Shape section -->
      <div class="accordion-section open" id="sec-object">
        <div class="accordion-header" onclick="toggleAccordion(this)">
          <span>Shape</span>
          <span class="accordion-arrow">&#9660;</span>
        </div>
        <div class="accordion-body">
          <div class="accordion-body-inner" id="sec-object-inner"></div>
        </div>
      </div>

      <!-- Effects section -->
      <div class="accordion-section" id="sec-effects">
        <div class="accordion-header" onclick="toggleAccordion(this)">
          <span>Effects</span>
          <span class="accordion-arrow">&#9660;</span>
        </div>
        <div class="accordion-body">
          <div class="accordion-body-inner" id="sec-effects-inner"></div>
        </div>
      </div>

      <!-- Camera section -->
      <div class="accordion-section" id="sec-camera">
        <div class="accordion-header" onclick="toggleAccordion(this)">
          <span>Camera</span>
          <span class="accordion-arrow">&#9660;</span>
        </div>
        <div class="accordion-body">
          <div class="accordion-body-inner" id="sec-camera-inner"></div>
        </div>
      </div>

    </div><!-- /#panel-controls -->

    <!-- Learn mode (hidden initially) -->
    <div id="panel-learn" style="display:none;"></div>

    <button class="panel-export-btn" onclick="openExportModal()">&#8682; Export Scene</button>
    <button class="panel-export-btn" onclick="loadConfig()" style="border-color:#666;color:#666;">Load Config</button>
  </aside>

  <!-- Export modal -->
  <div id="export-modal">
    <div class="export-content">
      <div class="export-header">
        <h3>Export Scene</h3>
        <button class="export-close-btn" onclick="closeExportModal()">&#10005;</button>
      </div>
      <div class="export-tabs">
        <button class="export-tab active" data-tab="overview" onclick="switchExportTab('overview')">Overview</button>
        <button class="export-tab" data-tab="effects" onclick="switchExportTab('effects')">Effects</button>
        <button class="export-tab" data-tab="config" onclick="switchExportTab('config')">Config JSON</button>
        <button class="export-tab" data-tab="singlefile" onclick="switchExportTab('singlefile')">Single File HTML</button>
      </div>
      <div class="export-code">
        <div id="export-panel-overview" class="export-panel"></div>
        <div id="export-panel-effects" class="export-panel" style="display:none;"></div>
        <div id="export-panel-config" class="export-panel" style="display:none;">
          <pre id="export-config-pre">// click Config JSON tab to generate…</pre>
        </div>
        <div id="export-panel-singlefile" class="export-panel" style="display:none;">
          <div class="export-sf-bar">
            <button class="export-sf-generate" onclick="generateSingleFile()">&#9881; Generate standalone HTML</button>
            <span id="export-sf-progress" class="export-sf-progress"></span>
          </div>
          <textarea id="export-singlefile-out" class="export-sf-out" readonly placeholder="Click Generate to inline every asset as a data-URL and produce a real single-file HTML you can copy-paste into any hosting."></textarea>
        </div>
      </div>
      <div class="export-actions" id="export-actions">
        <button class="export-copy" onclick="copyExport()">&#10697; Copy</button>
        <button class="export-download" onclick="downloadExport()">&#8615; Download</button>
      </div>
    </div>
  </div>

  <canvas id="webgl"></canvas>

<script>
  gsap.registerPlugin(ScrollTrigger);
  const lenis = new Lenis({
    duration: 1.2,
    easing: (e) => Math.min(1, 1.001 - Math.pow(2, -10 * e)),
    touchMultiplier: 2
  });
  window.lenis = lenis;
  lenis.on("scroll", ScrollTrigger.update);
  gsap.ticker.add((t) => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);
</script>

<!-- Constructor Panel Logic -->
<script>
  /* =========================================================
     CONFIG STATE
  ========================================================= */
  const config = {
    object: {
      shape: 'icosahedron',
      eta: 1.07,
      glow: 0.34,
      complexity: 0.66,
      gridScale: 1.0,
      gridEnabled: true,
      lightColor: '#7b5623',
      scale: 3.9,
      shapeSize: 0.55,
      shapeRound: 0.015,
      iridMode: 1,
      iridStrength: 0.29,
      iridHue: 0.405
    },
    bloom: {
      strength: 0.34,
      radius: 0.5,
      threshold: 0.15,
      exposure: 1.26
    },
    particles: {
      count: 4096,
      focus: 0.9,
      focusDistance: 3.0,
      grid: false,
      sine: false
    },
    aurora: {
      enabled: true,
      mode: 'rainbow',
      color: '#5ad2c6',
      intensity: 0.013,
      height: -1.0,
      scale: 4.5,
      hueShift: 0.20,
      hueSpread: 1.50,
      hueSat: 0.72
    },
    camera: {
      fov: 45,
      distance: 8,
      parallaxStrength: 1.0,
      orbit: false,
      orbitSpeed: 0.5,
      speedVariation: 0.5
    },
    presentation: {
      shapeInterval: 8,
      speed: 1.0
    }
  };

  /* =========================================================
     PANEL TOGGLE / ACCORDION / MODE
  ========================================================= */
  function togglePanel() {
    const panel = document.getElementById('constructor-panel');
    const toggle = document.getElementById('panel-toggle');
    const isOpen = panel.classList.toggle('open');
    toggle.classList.toggle('panel-open', isOpen);
  }

  function toggleAccordion(header) {
    const section = header.closest('.accordion-section');
    section.classList.toggle('open');
  }

  function setPanelMode(mode) {
    const controls = document.getElementById('panel-controls');
    const learn = document.getElementById('panel-learn');
    document.querySelectorAll('.panel-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
    if (mode === 'controls') {
      controls.style.display = '';
      learn.style.display = 'none';
    } else {
      controls.style.display = 'none';
      learn.style.display = '';
    }
  }

  /* =========================================================
     PRESENTATION MODE
  ========================================================= */
  const SHAPE_LIST = ['cube', 'octahedron', 'icosahedron', 'dodecahedron'];
  let _presentationActive = false;
  let _shapeCycleIndex = 0;
  let _presPrevOrbit = false;
  let _presTimeline = null;

  function startPresentation() {
    _presentationActive = true;
    const panel = document.getElementById('constructor-panel');
    const toggle = document.getElementById('panel-toggle');
    panel.classList.remove('open');
    toggle.classList.remove('panel-open');
    toggle.classList.add('hidden');
    _presPrevOrbit = config.camera.orbit;
    _shapeCycleIndex = 0;
    _runNextTransition();
    document.addEventListener('keydown', _exitPresentationOnEsc);
  }

  function exitPresentation() {
    _presentationActive = false;
    if (_presTimeline) { _presTimeline.kill(); _presTimeline = null; }
    config.camera.orbit = _presPrevOrbit;
    // orbitSpeed intentionally NOT reset — respect user's slider setting

    // Clear Play-induced uniform overrides so the shape returns to its canonical look
    delete config.object._glowWidthOverride;
    delete config.object._fresnelOverride;
    delete config.object._envIntensityOverride;

    // Restore active shape's SHAPE_META defaults (Play may have left size/bevel/glow
    // at an interpolated close-up state if user hit Esc mid-animation)
    const curMeta = window.SHAPE_META ? window.SHAPE_META[config.object.shape] : null;
    if (curMeta) {
      if (curMeta.defaultSize !== undefined) config.object.shapeSize = curMeta.defaultSize;
      if (curMeta.defaultRound !== undefined) config.object.shapeRound = curMeta.defaultRound;
      if (curMeta.glow !== undefined) config.object.glow = curMeta.glow;
      if (curMeta.complexity !== undefined) config.object.complexity = curMeta.complexity;
      if (curMeta.eta !== undefined) config.object.eta = curMeta.eta;
      if (curMeta.scale !== undefined) config.object.scale = curMeta.scale;
      if (curMeta.bloom) {
        config.bloom.exposure = curMeta.bloom.exposure;
        config.bloom.strength = curMeta.bloom.strength;
      }
    }
    // edgeGlow back to full — Play's close-up tweens drop it to 0
    const _s3d = window.scene3d;
    if (_s3d && _s3d.cubeMat && _s3d.cubeMat.uniforms.edgeGlow) {
      _s3d.cubeMat.uniforms.edgeGlow.value = 1.0;
    }
    if (typeof updateObjectUniforms === 'function') updateObjectUniforms();
    if (typeof updateBloomUniforms === 'function') updateBloomUniforms();
    if (typeof populateObjectSection === 'function') populateObjectSection();
    if (typeof populateEffectsSection === 'function') populateEffectsSection();

    document.getElementById('panel-toggle').classList.remove('hidden');
    document.removeEventListener('keydown', _exitPresentationOnEsc);
  }

  function _exitPresentationOnEsc(e) {
    if (e.key === 'Escape') exitPresentation();
  }

  function _runNextTransition() {
    if (!_presentationActive) return;

    const nextShape = SHAPE_LIST[_shapeCycleIndex % SHAPE_LIST.length];
    _shapeCycleIndex++;

    // Get target shape defaults
    const s3d = window.scene3d;
    const meta = (typeof SHAPE_META !== 'undefined') ? SHAPE_META[nextShape] : null;
    const targetEta = (meta && meta.eta !== undefined) ? meta.eta : 1.75;
    const targetGlow = (meta && meta.glow !== undefined) ? meta.glow : 0.64;
    const targetScale = (meta && meta.scale !== undefined) ? meta.scale : 3;
    const targetDistance = 8; // always return to default camera distance

    // Save current values for restore
    const startEta = config.object.eta;
    const startGlow = config.object.glow;
    const startScale = config.object.scale;

    // Zoom normal for current shape (approach face head-on)
    const currentMeta = window.SHAPE_META ? window.SHAPE_META[config.object.shape] : null;

    // Close-up params derived from shape meta (enter = current shape, exit = next shape)
    function _closeFromMeta(m) {
      // Close-up phase: camera sits at ~0.05 distance. High scale (e.g. octahedron=16)
      // causes grid density to exceed shader resolution → moire artifacts. Cap scale
      // and complexity so the close-up shows crisp geometry, not density mosh.
      const rawScale = (m && m.scale !== undefined) ? m.scale : 3;
      const rawComplexity = (m && m.complexity !== undefined) ? m.complexity : 1.0;
      return {
        size: (m && m.defaultSize) || 0.48,
        bevel: 0.001,
        eta: (m && m.eta !== undefined) ? m.eta : 1.75,
        scale: Math.min(rawScale, 4.0),
        glow: 0.73,
        glowWidth: (m && m.glowWidth) || 0.008,
        complexity: Math.min(rawComplexity, 0.5),
        fresnel: (m && m.fresnelPower !== undefined) ? m.fresnelPower : 3.0,
        envIntensity: (m && m.envIntensity !== undefined) ? m.envIntensity : 5.0,
        bloom: (m && m.bloom) ? { exposure: m.bloom.exposure, strength: m.bloom.strength } : { exposure: 1.14, strength: 0.30 }
      };
    }
    const enterClose = _closeFromMeta(currentMeta);
    const exitClose = _closeFromMeta(meta);
    const zn = (currentMeta && currentMeta.zoomNormal) || [0,0,1];
    const znLen = Math.sqrt(zn[0]*zn[0]+zn[1]*zn[1]+zn[2]*zn[2]);
    const zoomDir = [zn[0]/znLen, zn[1]/znLen, zn[2]/znLen];

    const startBevel = config.object.shapeRound;
    const startSize = config.object.shapeSize;
    const _metaStart = window.SHAPE_META ? window.SHAPE_META[config.object.shape] : null;
    const startGlowWidth = (config.object._glowWidthOverride !== undefined)
      ? config.object._glowWidthOverride
      : ((_metaStart && _metaStart.glowWidth !== undefined) ? _metaStart.glowWidth : 0.008);
    const startComplexity = config.object.complexity;
    const startFresnel = (config.object._fresnelOverride !== undefined)
      ? config.object._fresnelOverride
      : ((_metaStart && _metaStart.fresnelPower !== undefined) ? _metaStart.fresnelPower : 3.0);
    const startEnvIntensity = (config.object._envIntensityOverride !== undefined)
      ? config.object._envIntensityOverride
      : ((_metaStart && _metaStart.envIntensity !== undefined) ? _metaStart.envIntensity : 5.0);
    const startBloomExposure = config.bloom.exposure;
    const startBloomStrength = config.bloom.strength;
    const targetBevel = (meta && meta.defaultRound !== undefined) ? meta.defaultRound : startBevel;

    const tweenObj = {
      eta: startEta,
      glow: startGlow,
      scale: startScale,
      bevel: startBevel,
      edgeGlow: 1.0,
      camX: 0, camY: 0.5, camZ: 8,
      size: startSize,
      glowWidth: startGlowWidth,
      complexity: startComplexity,
      fresnel: startFresnel,
      envIntensity: startEnvIntensity,
      bloomExposure: startBloomExposure,
      bloomStrength: startBloomStrength
    };

    let _presOrbitDisabled = false;

    function syncUniforms() {
      config.object.eta = tweenObj.eta;
      config.object.glow = tweenObj.glow;
      config.object.scale = tweenObj.scale;
      config.object.shapeRound = tweenObj.bevel;
      config.object.shapeSize = tweenObj.size;
      // Presentation tween overrides for uniforms that otherwise come from SHAPE_META
      config.object._glowWidthOverride = tweenObj.glowWidth;
      config.object._fresnelOverride = tweenObj.fresnel;
      config.object._envIntensityOverride = tweenObj.envIntensity;
      config.object.complexity = tweenObj.complexity;
      config.bloom.exposure = tweenObj.bloomExposure;
      config.bloom.strength = tweenObj.bloomStrength;
      if (s3d && s3d.cubeMat) {
        s3d.cubeMat.uniforms.edgeGlow.value = tweenObj.edgeGlow;
      }
      if (_presOrbitDisabled && s3d && s3d.baseCamPos) {
        s3d.baseCamPos.set(tweenObj.camX, tweenObj.camY, tweenObj.camZ);
      }
      updateObjectUniforms();
      updateBloomUniforms();
    }

    const tl = gsap.timeline({
      onComplete: () => {
        config.camera.orbit = true;
        _presOrbitDisabled = false;
        if (_presentationActive) _runNextTransition();
      }
    });
    tl.timeScale(config.presentation.speed * 0.1);

    // If first shape — just apply it and hold
    if (_shapeCycleIndex === 1) {
      config.object.shape = nextShape;
      if (s3d && typeof s3d.setShape === 'function') s3d.setShape(nextShape);
      config.camera.orbit = true;
      tweenObj.eta = targetEta;
      tweenObj.glow = targetGlow;
      tweenObj.scale = targetScale;
      if (meta) {
        tweenObj.size = meta.defaultSize;
        tweenObj.bevel = meta.defaultRound;
        tweenObj.glowWidth = meta.glowWidth || 0.008;
        tweenObj.fresnel = meta.fresnelPower || 3.0;
        tweenObj.envIntensity = meta.envIntensity || 5.0;
        if (meta.bloom) {
          tweenObj.bloomExposure = meta.bloom.exposure;
          tweenObj.bloomStrength = meta.bloom.strength;
        }
      }
      syncUniforms();
      tl.to({}, { duration: 5 });
      _presTimeline = tl;
      return;
    }

    // Step 1: Disable orbit, smoothly fly to face normal, zoom in + transition to close-up params (2s)
    // Target values for new shape
    const targetSize = (meta && meta.defaultSize) || 0.48;
    const targetGlowWidth = (meta && meta.glowWidth) || 0.008;
    const targetFresnel = (meta && meta.fresnelPower) || 3.0;
    const targetEnvIntensity = (meta && meta.envIntensity) || 5.0;
    const targetBloomExposure = (meta && meta.bloom) ? meta.bloom.exposure : 0.65;
    const targetBloomStrength = (meta && meta.bloom) ? meta.bloom.strength : 0.3;
    const newZn = (meta && meta.zoomNormal) || [0,0,1];
    const newZnLen = Math.sqrt(newZn[0]*newZn[0]+newZn[1]*newZn[1]+newZn[2]*newZn[2]);
    const outDir = [newZn[0]/newZnLen, newZn[1]/newZnLen, newZn[2]/newZnLen];
    const closeDist = 0.05;

    // ===== ENTER =====

    // Disable orbit, capture position
    tl.call(() => {
      config.camera.orbit = false;
      _presOrbitDisabled = true;
      window._orbitAngleOffset = undefined;
      window._orbitAngleBase = undefined;
      if (s3d && s3d.baseCamPos) {
        tweenObj.camX = s3d.baseCamPos.x;
        tweenObj.camY = s3d.baseCamPos.y;
        tweenObj.camZ = s3d.baseCamPos.z;
      }
    });

    // A: Camera flies in + eta rises + bevel/edges fade (2s)
    tl.to(tweenObj, {
      camX: zoomDir[0] * closeDist,
      camY: zoomDir[1] * closeDist + 0.5,
      camZ: zoomDir[2] * closeDist,
      eta: enterClose.eta,
      bevel: enterClose.bevel,
      edgeGlow: 0,
      size: enterClose.size,
      scale: enterClose.scale,
      bloomExposure: enterClose.bloom.exposure,
      bloomStrength: enterClose.bloom.strength,
      duration: 2,
      ease: 'power2.inOut',
      onUpdate: syncUniforms
    }, '>');

    // B: Depth + glow + interior params rise with 0.5s delay (1.5s)
    tl.to(tweenObj, {
      glow: enterClose.glow,
      glowWidth: enterClose.glowWidth,
      complexity: enterClose.complexity,
      fresnel: enterClose.fresnel,
      envIntensity: enterClose.envIntensity,
      duration: 1.5,
      ease: 'power2.inOut',
      onUpdate: syncUniforms
    }, '-=1.5');

    // C: Mini pause inside (0.5s)
    tl.to({}, { duration: 0.5 });

    // D: Everything darkens — depth→0 (1.5s)
    tl.to(tweenObj, {
      glow: 0.0001,
      duration: 1.5,
      ease: 'power2.in',
      onUpdate: syncUniforms
    });

    // ===== SHAPE CHANGE (in dark) =====
    tl.call(() => {
      config.object.shape = nextShape;
      if (s3d && typeof s3d.setShape === 'function') s3d.setShape(nextShape);
      // Snap ALL params to new shape's close-up values
      tweenObj.eta = exitClose.eta;
      tweenObj.scale = exitClose.scale;
      tweenObj.size = exitClose.size;
      tweenObj.bevel = exitClose.bevel;
      tweenObj.glowWidth = exitClose.glowWidth;
      tweenObj.complexity = exitClose.complexity;
      tweenObj.fresnel = exitClose.fresnel;
      tweenObj.envIntensity = exitClose.envIntensity;
      tweenObj.bloomExposure = exitClose.bloom.exposure;
      tweenObj.bloomStrength = exitClose.bloom.strength;
      syncUniforms();
    });

    // ===== EXIT (mirror) =====

    // D': Depth rises from black (1.5s)
    tl.to(tweenObj, {
      glow: exitClose.glow,
      duration: 1.5,
      ease: 'power2.out',
      onUpdate: syncUniforms
    });

    // C': Mini pause inside (0.5s)
    tl.to({}, { duration: 0.5 });

    // B': Interior params return (starts, overlaps with A')
    tl.to(tweenObj, {
      glow: targetGlow,
      glowWidth: targetGlowWidth,
      complexity: 1.0,
      fresnel: targetFresnel,
      envIntensity: targetEnvIntensity,
      duration: 1.5,
      ease: 'power2.inOut',
      onUpdate: syncUniforms
    }, '>');

    // A': Camera flies out + eta drops + bevel/edges return (2s, overlaps B' by 1s)
    tl.to(tweenObj, {
      camX: outDir[0] * 8, camY: outDir[1] * 8 + 0.5, camZ: outDir[2] * 8,
      eta: targetEta,
      bevel: targetBevel,
      edgeGlow: 1.0,
      size: targetSize,
      scale: targetScale,
      bloomExposure: targetBloomExposure,
      bloomStrength: targetBloomStrength,
      duration: 2,
      ease: 'power2.inOut',
      onUpdate: syncUniforms
    }, '-=1');

    // Smooth orbit resume: tween from current to orbit position (1s)
    tl.call(() => {
      _presOrbitDisabled = false;
      config.camera.distance = 8;
      if (s3d && s3d.baseCamPos) {
        window._orbitAngleOffset = Math.atan2(s3d.baseCamPos.x, s3d.baseCamPos.z);
        window._orbitAngleBase = undefined;
      }
      config.camera.orbit = true;

      // Snap config.object to the landed shape's canonical meta so the "hold" phase
      // of Play shows each shape at its true default (octahedron stays at 0.10/16.0,
      // icosahedron at 0.55/3.9, etc.), regardless of interpolated tween state.
      if (meta) {
        if (meta.defaultSize !== undefined) config.object.shapeSize = meta.defaultSize;
        if (meta.defaultRound !== undefined) config.object.shapeRound = meta.defaultRound;
        if (meta.glow !== undefined) config.object.glow = meta.glow;
        if (meta.complexity !== undefined) config.object.complexity = meta.complexity;
        if (meta.eta !== undefined) config.object.eta = meta.eta;
        if (meta.scale !== undefined) config.object.scale = meta.scale;
        if (meta.bloom) {
          config.bloom.exposure = meta.bloom.exposure;
          config.bloom.strength = meta.bloom.strength;
        }
      }
      // Drop tween-era overrides so uniforms track meta values cleanly
      delete config.object._glowWidthOverride;
      delete config.object._fresnelOverride;
      delete config.object._envIntensityOverride;
      if (s3d && s3d.cubeMat && s3d.cubeMat.uniforms.edgeGlow) {
        s3d.cubeMat.uniforms.edgeGlow.value = 1.0;
      }
      if (typeof updateObjectUniforms === 'function') updateObjectUniforms();
      if (typeof updateBloomUniforms === 'function') updateBloomUniforms();
    });

    // Hold with orbit (3s)
    tl.to({}, { duration: 3 });

    _presTimeline = tl;
  }

  /* =========================================================
     CONTROL GENERATOR HELPERS
  ========================================================= */
  /**
   * Returns an HTML string for a labeled range slider.
   * @param {string} label - Display label
   * @param {string} id    - Unique element id
   * @param {number} min
   * @param {number} max
   * @param {number} step
   * @param {number} value - Initial value
   * @param {string} onChange - JS expression called with slider value (receives `this.value`)
   */
  function makeSlider(label, id, min, max, step, value, onChange) {
    return `
      <div class="ctrl-group">
        <div class="ctrl-row">
          <span class="ctrl-label">${label}</span>
          <span class="ctrl-value" id="${id}-val">${value}</span>
        </div>
        <div class="ctrl-row">
          <input type="range" class="ctrl-slider" id="${id}"
            min="${min}" max="${max}" step="${step}" value="${value}"
            oninput="document.getElementById('${id}-val').textContent=parseFloat(this.value).toFixed(${_decimalPlaces(step)});(${onChange})(parseFloat(this.value))">
        </div>
      </div>`;
  }

  /**
   * Returns an HTML string for a labeled toggle switch.
   */
  function makeToggle(label, id, active, onChange) {
    const checked = active ? 'checked' : '';
    return `
      <div class="ctrl-group">
        <div class="ctrl-row">
          <span class="ctrl-label">${label}</span>
          <label class="ctrl-toggle">
            <input type="checkbox" id="${id}" ${checked}
              onchange="(${onChange})(this.checked)">
            <span class="ctrl-toggle-track"></span>
          </label>
        </div>
      </div>`;
  }

  /**
   * Returns an HTML string for a labeled color picker.
   */
  function makeColorPicker(label, id, value, onChange) {
    return `
      <div class="ctrl-group">
        <div class="ctrl-row">
          <span class="ctrl-label">${label}</span>
          <input type="color" class="ctrl-color" id="${id}" value="${value}"
            oninput="(${onChange})(this.value)">
        </div>
      </div>`;
  }

  /**
   * Returns an HTML string for a labeled dropdown select.
   * @param {Array<{value: string|number, label: string}>} options
   */
  function makeDropdown(label, id, options, current, onChange) {
    const opts = options.map(o =>
      `<option value="${o.value}"${String(o.value) === String(current) ? ' selected' : ''}>${o.label}</option>`
    ).join('');
    return `
      <div class="ctrl-group">
        <div class="ctrl-row">
          <span class="ctrl-label">${label}</span>
          <select class="ctrl-select" id="${id}"
            onchange="(${onChange})(this.value)">${opts}</select>
        </div>
      </div>`;
  }

  /** Internal helper: compute decimal places from step */
  function _decimalPlaces(step) {
    const s = String(step);
    const dot = s.indexOf('.');
    return dot === -1 ? 0 : s.length - dot - 1;
  }

  /* =========================================================
     EXPORT MODAL  (4 tabs: Overview / Effects / Config / SingleFile)
  ========================================================= */
  let _currentExportTab = 'overview';
  let _singleFileOutput = '';

  function openExportModal() {
    const modal = document.getElementById('export-modal');
    modal.classList.add('open');
    // Populate static panels once per open so counters etc. stay fresh.
    document.getElementById('export-panel-overview').innerHTML = buildOverviewPanel();
    document.getElementById('export-panel-effects').innerHTML = buildEffectsPanel();
    document.getElementById('export-config-pre').textContent = buildConfigJSON();
    switchExportTab('overview');
  }

  function closeExportModal() {
    document.getElementById('export-modal').classList.remove('open');
  }

  function switchExportTab(tab) {
    _currentExportTab = tab;
    document.querySelectorAll('.export-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    const panels = ['overview', 'effects', 'config', 'singlefile'];
    panels.forEach(p => {
      const el = document.getElementById('export-panel-' + p);
      if (el) el.style.display = (p === tab) ? '' : 'none';
    });
    if (tab === 'config') {
      // Refresh JSON each time (config may have changed).
      document.getElementById('export-config-pre').textContent = buildConfigJSON();
    }
    // Copy/Download only meaningful for config + singlefile. Hide on text-only tabs.
    const actions = document.getElementById('export-actions');
    if (actions) actions.style.display = (tab === 'overview' || tab === 'effects') ? 'none' : '';
  }

  function copyExport() {
    let text = '';
    if (_currentExportTab === 'config') text = document.getElementById('export-config-pre').textContent;
    else if (_currentExportTab === 'singlefile') text = document.getElementById('export-singlefile-out').value;
    else return;
    if (!text) return;
    navigator.clipboard.writeText(text).catch(() => {});
  }

  function downloadExport() {
    let text = '', ext = 'txt';
    if (_currentExportTab === 'config') {
      text = document.getElementById('export-config-pre').textContent;
      ext = 'json';
    } else if (_currentExportTab === 'singlefile') {
      text = document.getElementById('export-singlefile-out').value;
      ext = 'html';
    } else {
      return;
    }
    if (!text) return;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'scene-export.' + ext;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ---------- Tab 1: Overview ----------
  function buildOverviewPanel() {
    // Line numbers are approximate anchors at the time of export — grep these in index.html.
    return `
      <h4>What the scene is</h4>
      <p>One full-screen canvas with a single post-processed raymarch pass plus two "extras" composited on top. No meshes for the hero shape — every pixel is a ray that marches through a Signed Distance Function, and the fragment shader computes the hit point, normal, Fresnel term and refracted interior on the spot.</p>
      <p>Pipeline, in order of execution per frame:</p>
      <ul>
        <li><strong>GPGPU particles</strong> — position/velocity textures advanced on the GPU via <code>GPUComputationRenderer</code>, read back as attributes on an instanced points mesh.</li>
        <li><strong>Aurora ribbons</strong> — six <code>TubeGeometry</code> curves animated by simplex noise at three frequencies in the vertex shader.</li>
        <li><strong>SDF raymarch pass</strong> (main object) &rarr; <code>UnrealBloomPass</code> (5-level mip pyramid) &rarr; <code>fluidDistortionShader</code> (screen-space warp driven by the Jos-Stam fluid texture) &rarr; <code>OutputPass</code> (ACES Filmic tonemap).</li>
      </ul>

      <h4>For non-3D devs</h4>
      <p>There is no mesh inside the hero cube / icosahedron. The fragment shader takes the pixel's ray direction, steps it through an SDF formula (<code>opSmoothUnion</code>-style blended primitives), stops when the distance is near zero, then estimates the normal from the SDF gradient. The Fresnel reflection coefficient, refracted interior ray, and glowing grid pattern are all derived from that normal — no vertex buffer exists for the shape itself.</p>
      <p>The fluid effect is a textbook 2008 Jos Stam advection-diffusion sim running at 256&times;256: mouse movement splats velocity/density, the sim advects itself, and the final density map is sampled as a UV offset by the compositor shader to warp whatever the bloom pass just rendered.</p>

      <h4>File map &mdash; where to tweak what</h4>
      <p>All of it lives in <code>index.html</code>. Line numbers are a snapshot; use <code>grep</code> if the file has drifted.</p>
      <ul>
        <li><code>SHAPE_META</code> (per-shape geometry / material defaults: size, bevel, glowWidth, fresnelPower, envIntensity) &mdash; around <strong>line 2401</strong></li>
        <li>Mouse fluid sim (splat + advect shaders, 256&sup2; double-buffered render targets) &mdash; around <strong>line 1687</strong></li>
        <li>Fluid distortion <code>ShaderPass</code> (the pass that actually warps the screen) &mdash; around <strong>line 1820</strong></li>
        <li>Aurora ribbons (<code>createAuroraMesh</code>, <code>TubeGeometry</code>, 6 layered curves, simplex-noise vertex shader) &mdash; around <strong>line 3096</strong></li>
        <li>GPGPU particles (<code>GPUComputationRenderer</code> init, position/velocity variables, compute shaders) &mdash; around <strong>line 2739</strong></li>
        <li>Post chain (<code>EffectComposer</code>: RenderPass &rarr; Bloom &rarr; Fluid &rarr; Output) &mdash; around <strong>line 1663</strong></li>
        <li>SDF shape library (<code>shapeSDF</code> / <code>shapeNormal</code> / <code>shapeIntersect</code> per primitive) &mdash; around <strong>line 1898</strong></li>
      </ul>

      <h4>Before you fork</h4>
      <p>Most "I want my own look" edits happen in three places: <code>SHAPE_META</code> (materials), the <code>config</code> object literal (runtime knobs the Constructor panel drives), and the bloom uniforms. Full shader rewrites are rarely needed.</p>
    `;
  }

  // ---------- Tab 2: Effects ----------
  function buildEffectsPanel() {
    const cards = [
      {
        title: 'Refraction & Bevel',
        what: 'Snell\u2019s law is applied at the ray\u2013SDF hit point: given the incoming direction and the SDF-gradient normal, a refracted ray is traced into the interior, yielding the transmitted color. The bevel comes from the SDF itself &mdash; distance to the surface is offset by <code>RAD</code>, producing a smooth rounded shell (same trick as <code>opSmoothUnion</code>).',
        why: 'Gives the hero shape weight and physicality without any actual mesh &mdash; the look is basically that of cast glass.',
        where: 'Inigo Quilez\u2019s SDF articles, glTF <code>KHR_materials_transmission</code>, Blender Cycles glass BSDF.'
      },
      {
        title: 'Aurora ribbons',
        what: 'Six <code>CatmullRomCurve3</code> paths extruded into <code>TubeGeometry</code> (200 segments, radius 0.9, 2 radial). Vertex shader displaces each vertex by 3D simplex noise sampled at three frequencies and summed &mdash; the classic <em>fBm</em> recipe &mdash; then the fragment shader lerps between two palette colors based on noise magnitude.',
        why: 'Adds slow volumetric motion behind the hero shape without the cost of volumetric marching.',
        where: 'Real-time VFX ribbon tools (Houdini FLIP-less flow viz, shadertoy "aurora" set), Unreal Niagara ribbon emitters.'
      },
      {
        title: 'Mouse fluid',
        what: 'A 256\u00d7256 Jos-Stam advect+splat solver runs on two ping-ponged render targets. Mouse movement splats a Gaussian of velocity+dye; every frame the sim advects itself and decays. The final density texture is sampled by the composite <code>ShaderPass</code> to offset screen UVs (distort) and to split R/G/B by different offsets (chromatic aberration).',
        why: 'Turns cursor movement into a tactile screen-space ripple &mdash; the hero shape appears to live behind a disturbed water surface.',
        where: 'Pavel Do\u0161lin\u00fd\u2019s "WebGL Fluid Simulation", Shadertoy "Stable Fluids", a surprising amount of award-winning awwwards microsites.'
      },
      {
        title: 'Bloom',
        what: 'Three.js\u2019s <code>UnrealBloomPass</code>: a 5-level mip pyramid. Each mip is threshold\u2011high\u2011passed, blurred with a separable Gaussian, then all levels are additively combined back onto the main render target. <code>strength</code> is the post-composite gain; <code>threshold</code> and <code>radius</code> shape which pixels bloom and how far the halo reaches.',
        why: 'The SDF hit already produces high-dynamic-range emissive grid pixels; bloom is what turns those into the signature neon glow.',
        where: 'Unreal Engine\u2019s "Bloom", Unity URP bloom, virtually every stylized game since ~2008.'
      },
      {
        title: 'GPGPU particles',
        what: '4096 particles (64\u00d764 grid) whose positions and velocities live in two floating-point render targets. Each frame a compute <code>ShaderMaterial</code> reads them and writes the new state into the opposite target (ping-pong). Velocity rotates around Y with a golden-ratio noise offset and is nudged by the fluid map; positions integrate accordingly.',
        why: 'Lets 4k particles update on the GPU with zero CPU per-particle cost &mdash; and it shares the same fluid texture as the distortion pass, so they drift on the mouse.',
        where: 'Three.js <code>GPUComputationRenderer</code> examples (birds, protoplanet), any particle system that outgrew CPU updates &mdash; WebGPU compute shaders are the modern descendant.'

    return cards.map(c => `
      <div class="effect-card">

        <div class="effect-where"><strong>Where else:</strong> ${c.where}</div>
      </div>
    `).join('');
  }

  // ---------- Tab 3: Config JSON with _comment_* keys ----------
  const _configCommentMap = {
    object: 'Hero shape material & geometry. eta = refractive index (glass \u2248 1.5, water \u2248 1.33, air \u2248 1.0). shapeSize / shapeRound (bevel) map to SDF SIZE and RAD. glow + complexity + gridScale drive the emissive interior grid. Per-shape tuning (glowWidth, fresnelPower, envIntensity) comes from SHAPE_META \u2014 see index.html ~line 2401.',
    bloom: 'UnrealBloomPass (5-level mip pyramid). exposure is the pre-tonemap gain on the renderer (ACES Filmic). strength scales the composited bloom; radius stretches the halo; threshold picks which pixels bloom.',
    particles: 'GPGPU particle system via GPUComputationRenderer (64x64 textures, 4096 particles). focus / focusDistance / focusRange drive DOF falloff. grid / sine toggle alternate position formulas in the compute shader.',
    aurora: 'Six TubeGeometry ribbons animated by 3-frequency simplex fBm in the vertex shader. mode selects a color palette (Aurora / Cyan / Sunset / Custom). intensity is alpha + emissive gain; height / scale are world-space transforms applied to the auroraGroup.',
    mouse: 'Jos-Stam fluid sim at 256\u00b2. intensity scales the splat force on mouse movement. refraction / diffraction drive the distort + chromatic-split uniforms on the compositing ShaderPass.',
    camera: 'PerspectiveCamera knobs. fov in degrees; distance is world-space radius from (0,0,0). Presentation mode tweens these.'
  };

  function buildConfigJSON() {
    // Emit { _comment_section: "...", section: {...}, _comment_next: "...", next: {...} }.
    // Keys are interleaved so the final text is valid JSON that humans can read top-to-bottom.
    const parts = [];
    const keys = Object.keys(config);
    keys.forEach(k => {
      if (_configCommentMap[k]) {
        parts.push(`  "_comment_${k}": ${JSON.stringify(_configCommentMap[k])}`);
      }
      parts.push(`  ${JSON.stringify(k)}: ${JSON.stringify(config[k], null, 2).replace(/\n/g, '\n  ')}`);
    });
    return '{\n' + parts.join(',\n') + '\n}';
  }

  // ---------- Tab 4: Single File HTML (real standalone) ----------
  const _sfProgress = (msg) => {
    const el = document.getElementById('export-sf-progress');
    if (el) el.textContent = msg || '';
  };

  async function generateSingleFile() {
    const btn = document.querySelector('.export-sf-generate');
    const out = document.getElementById('export-singlefile-out');
    if (btn) btn.disabled = true;
    _sfProgress('Fetching current page...');
    try {
      // 1. Fetch the current HTML.
      const htmlRes = await fetch(location.href, { cache: 'no-cache' });
      let html = await htmlRes.text();

      // 2. Discover asset URLs referenced from inline <script>/<style>/<img>.
      //    Rules: match any quoted string containing one of the known relative prefixes OR common asset extensions.
      //    Skip anything starting with http://, https://, data:, //.
      const assetRe = /(['"])((?:assets\/[^'"\s]+|[^'"\s]+\.(?:jpg|jpeg|png|hdr|webp|svg|mp4|gltf|glb|bin|ktx2)))\1/g;
      const found = new Set();
      let m;
      while ((m = assetRe.exec(html)) !== null) {
        const url = m[2];
        if (/^(https?:)?\/\//.test(url)) continue;
        if (url.startsWith('data:')) continue;
        // Skip unpkg importmap entries (already covered by the http check).
        found.add(url);
      }
      const assets = Array.from(found);
      _sfProgress(`Found ${assets.length} asset${assets.length === 1 ? '' : 's'}.`);

      // 3. Fetch each asset and inline as data URL.
      const replacements = {};
      let done = 0;
      for (const url of assets) {
        done++;
        _sfProgress(`Inlining assets... ${done}/${assets.length} (${url})`);
        try {
          const r = await fetch(url, { cache: 'no-cache' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const blob = await r.blob();
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(blob);
          });
          replacements[url] = dataUrl;
        } catch (err) {
          replacements[url] = '__INLINE_FAILED__' + err.message;
        }
      }

      // 4. Apply replacements (replace every quoted occurrence of the original URL).
      for (const [url, repl] of Object.entries(replacements)) {
        const escUrl = url.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (repl.startsWith('__INLINE_FAILED__')) {
          const reason = repl.slice('__INLINE_FAILED__'.length);
          // Keep original URL, append an HTML comment warning nearby (after the quote).
          const warn = `<!-- inline failed for ${url}: ${reason.replace(/-->/g, '--&gt;')} -->`;
          // Only inject one warning per asset, right before </head>.
          if (!html.includes(warn)) {
            html = html.replace('</head>', warn + '\n</head>');
          }
        } else {
          // Replace "url" or 'url' with "dataUrl" / 'dataUrl' keeping the surrounding quote.
          html = html.replace(new RegExp(`(['"])${escUrl}\\1`, 'g'), (_mm, q) => q + repl + q);
        }
      }

      _sfProgress(`Done. ${Math.round(html.length / 1024)} KB (${assets.length} asset${assets.length === 1 ? '' : 's'} processed).`);
      _singleFileOutput = html;
      out.value = html;
    } catch (err) {
      _sfProgress('Error: ' + err.message);
      out.value = '// Error generating single file: ' + err.message;
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  function loadConfig() {
    const input = prompt('Paste config JSON:');
    if (!input) return;
    try {
      const loaded = JSON.parse(input);
      Object.assign(config.object, loaded.object || {});
      Object.assign(config.bloom, loaded.bloom || {});
      Object.assign(config.particles, loaded.particles || {});
      Object.assign(config.aurora, loaded.aurora || {});
      Object.assign(config.camera, loaded.camera || {});
      // Re-apply all uniforms
      if (typeof updateObjectUniforms === 'function') updateObjectUniforms();
      if (typeof updateBloomUniforms === 'function') updateBloomUniforms();
      if (typeof updateParticleUniforms === 'function') updateParticleUniforms();
      if (typeof updateAuroraUniforms === 'function') updateAuroraUniforms();
      if (typeof updateCameraSettings === 'function') updateCameraSettings();
      // Re-render controls
      // Apply SHAPE_META defaults to initial shape (only if config hasn't been
      // custom-tuned by user — detected via saved tuning presence). This keeps the
      // default icosahedron at its canonical 0.55 size / 0.015 bevel instead of the
      // cube's 0.48 / 0.02.
      (function _applyInitialShapeMeta() {
        try {
          const m = window.SHAPE_META ? window.SHAPE_META[config.object.shape] : null;
          if (!m) return;
          if (loaded && loaded.object) return; // user had custom config, respect it
          if (m.defaultSize !== undefined) config.object.shapeSize = m.defaultSize;
          if (m.defaultRound !== undefined) config.object.shapeRound = m.defaultRound;
          if (m.glow !== undefined) config.object.glow = m.glow;
          if (m.complexity !== undefined) config.object.complexity = m.complexity;
          if (m.eta !== undefined) config.object.eta = m.eta;
          if (m.scale !== undefined) config.object.scale = m.scale;
          if (m.bloom) {
            config.bloom.exposure = m.bloom.exposure;
            config.bloom.strength = m.bloom.strength;
          }
        } catch (e) {}
      })();
      if (typeof populateObjectSection === 'function') populateObjectSection();
      if (typeof populateLightingSection === 'function') populateLightingSection();
      if (typeof populateParticlesSection === 'function') populateParticlesSection();
      if (typeof populateCameraSection === 'function') populateCameraSection();
      alert('Config loaded!');
    } catch(e) { alert('Invalid JSON: ' + e.message); }
  }

  /* =========================================================
     TASK 3 — OBJECT SECTION
  ========================================================= */
  function updateObjectUniforms() {
    const s3d = window.scene3d;
    if (!s3d?.cubeMat) return;
    const u = s3d.cubeMat.uniforms;
    // Pull per-shape tuning from SHAPE_META (glowWidth, fresnelPower, envIntensity).
    // Presentation tween may override these by writing directly to uniforms.
    const meta = window.SHAPE_META ? window.SHAPE_META[config.object.shape] : null;
    const metaGlowWidth = (meta && meta.glowWidth !== undefined) ? meta.glowWidth : 0.008;
    const metaFresnel = (meta && meta.fresnelPower !== undefined) ? meta.fresnelPower : 3.0;
    const metaEnvIntensity = (meta && meta.envIntensity !== undefined) ? meta.envIntensity : 5.0;
    u.eta.value = config.object.eta;
    u.glow.value = config.object.gridEnabled ? config.object.glow : 0.0;
    u.glowWidth.value = (config.object._glowWidthOverride !== undefined) ? config.object._glowWidthOverride : metaGlowWidth;
    // Soft-cap grid density at high scale to suppress raymarch-aliasing moire
    const _sScale = Math.max(1.0, config.object.scale || 1.0);
    const _densityMul = 0.5 + 0.5 * Math.min(1.0, 6.0 / _sScale);
    u.complexity.value = config.object.gridEnabled ? config.object.complexity * _densityMul : 0.0;
    u.envIntensity.value = (config.object._envIntensityOverride !== undefined) ? config.object._envIntensityOverride : metaEnvIntensity;
    u.lightColor.value.set(config.object.lightColor);
    if (u.fresnelPower) u.fresnelPower.value = (config.object._fresnelOverride !== undefined) ? config.object._fresnelOverride : metaFresnel;
    if (u.gridScale) u.gridScale.value = config.object.gridScale;
    if (u.gridEnabled) u.gridEnabled.value = config.object.gridEnabled ? 1.0 : 0.0;
    if (u.shapeSize) u.shapeSize.value = config.object.shapeSize;
    if (u.shapeRound) u.shapeRound.value = config.object.shapeRound;
    if (u.uIridMode) u.uIridMode.value = config.object.iridMode || 0;
    if (u.uIridStrength) u.uIridStrength.value = (config.object.iridStrength !== undefined) ? config.object.iridStrength : 1.0;
    if (u.uIridHue) u.uIridHue.value = config.object.iridHue || 0;
    s3d.infiniteCube.scale.setScalar(config.object.scale);
  }

  // Store per-shape tuning as you adjust sliders
  const shapeTuning = {};
  function saveCurrentTuning() {
    shapeTuning[config.object.shape] = {
      size: config.object.shapeSize,
      bevel: config.object.shapeRound
    };
  }

  function setShape(name) {
    // Save tuning of current shape before switching
    saveCurrentTuning();
    config.object.shape = name;
    const meta = window.SHAPE_META ? window.SHAPE_META[name] : null;
    // Restore saved tuning if user previously tweaked this shape, otherwise apply
    // canonical SHAPE_META defaults so each shape has its own natural look.
    if (shapeTuning[name]) {
      config.object.shapeSize = shapeTuning[name].size;
      config.object.shapeRound = shapeTuning[name].bevel;
    } else if (meta) {
      if (meta.defaultSize !== undefined) config.object.shapeSize = meta.defaultSize;
      if (meta.defaultRound !== undefined) config.object.shapeRound = meta.defaultRound;
    }
    // Also snap shape-wide defaults to meta when available — keeps each shape's
    // canonical glow/scale/eta/bloom tuning rather than inheriting the previous shape's.
    if (meta) {
      if (meta.glow !== undefined) config.object.glow = meta.glow;
      if (meta.complexity !== undefined) config.object.complexity = meta.complexity;
      if (meta.eta !== undefined) config.object.eta = meta.eta;
      if (meta.scale !== undefined) config.object.scale = meta.scale;
      if (meta.bloom) {
        config.bloom.exposure = meta.bloom.exposure;
        config.bloom.strength = meta.bloom.strength;
      }
    }
    // Clear any stale Play overrides so uniforms track meta values
    delete config.object._glowWidthOverride;
    delete config.object._fresnelOverride;
    delete config.object._envIntensityOverride;
    const s3d = window.scene3d;
    if (s3d && typeof s3d.setShape === 'function') s3d.setShape(name);
    updateObjectUniforms();
    updateBloomUniforms();
    populateObjectSection();
    populateEffectsSection();
  }

    el.innerHTML = `

      <div class="ctrl-subsection">Iridescence</div>

            <option value="0"${config.object.iridMode === 0 ? ' selected' : ''}>Off</option>
            <option value="1"${config.object.iridMode === 1 ? ' selected' : ''}>Cosine palette</option>
            <option value="2"${config.object.iridMode === 2 ? ' selected' : ''}>LUT gradient</option>
            <option value="3"${config.object.iridMode === 3 ? ' selected' : ''}>Thin-film dispersion</option>
          </select>

      ${makeSlider('Hue', 'obj-irid-hue', 0, 1, 0.005, config.object.iridHue, v => { config.object.iridHue = v; updateObjectUniforms(); })}
      <div class="ctrl-subsection">Interior</div>
      ${makeSlider('Depth', 'obj-glow', 0.1, 0.95, 0.01, config.object.glow, v => { config.object.glow = v; updateObjectUniforms(); })}
      ${makeSlider('Complexity', 'obj-complexity', 0, 1, 0.01, config.object.complexity, v => { config.object.complexity = v; updateObjectUniforms(); })}
    `;
  }

  /* =========================================================
     EFFECTS SECTION (Bloom + Aurora + Particles)
  ========================================================= */
  function updateBloomUniforms() {
    const s3d = window.scene3d;
    if (!s3d?.bloomPass) return;
    s3d.renderer.toneMappingExposure = config.bloom.exposure;
    s3d.bloomPass.strength = config.bloom.strength;
    s3d.bloomPass.radius = config.bloom.radius;
    s3d.bloomPass.threshold = config.bloom.threshold;
  }

  function updateParticleUniforms() {
    const s3d = window.scene3d;
    if (!s3d?.particleMat) return;
    s3d.particleMat.uniforms.uFocus.value = config.particles.focus;
    s3d.particleMat.uniforms.uFocusDistance.value = config.particles.focusDistance;
    s3d.positionVariable.material.uniforms.uGrid.value = config.particles.grid ? 1.0 : 0.0;
    s3d.positionVariable.material.uniforms.uSine.value = config.particles.sine ? 1.0 : 0.0;
  }

  function updateAuroraUniforms() {
    const s3d = window.scene3d;
    if (!s3d?.auroraGroup) return;
    s3d.auroraGroup.visible = config.aurora.enabled;
    s3d.auroraGroup.position.y = config.aurora.height;
    s3d.auroraGroup.scale.setScalar(config.aurora.scale);
    const modeMap = { 'default': 0.0, 'rainbow': 1.0, 'solid': 2.0 };
    const modeVal = modeMap[config.aurora.mode] !== undefined ? modeMap[config.aurora.mode] : 0.0;
    s3d.auroraGroup.children.forEach(mesh => {
      if (mesh.material && mesh.material.uniforms) {
        mesh.material.uniforms.uIntensity.value = config.aurora.intensity;
        if (mesh.material.uniforms.uMode) mesh.material.uniforms.uMode.value = modeVal;
        if (mesh.material.uniforms.uCustom) mesh.material.uniforms.uCustom.value.set(config.aurora.color);
        if (mesh.material.uniforms.uHueShift) mesh.material.uniforms.uHueShift.value = config.aurora.hueShift;
        if (mesh.material.uniforms.uHueSpread) mesh.material.uniforms.uHueSpread.value = config.aurora.hueSpread;
        if (mesh.material.uniforms.uHueSat) mesh.material.uniforms.uHueSat.value = config.aurora.hueSat;
      }
    });
    // Toggle Rainbow-only controls visibility
    const rbCtrls = document.getElementById('aurora-rainbow-ctrls');
    if (rbCtrls) rbCtrls.style.display = (config.aurora.mode === 'rainbow') ? '' : 'none';
  }

  function populateEffectsSection() {
    const el = document.getElementById('sec-effects-inner');
    if (!el) return;
    const auroraModes = [
      { value: 'default', label: 'Default' },
      { value: 'rainbow', label: 'Rainbow' },
      { value: 'solid',   label: 'Color' },
    ];
    const particleCounts = [
      { value: '1024',  label: '1024' },
      { value: '2048',  label: '2048' },
      { value: '4096',  label: '4096' },
      { value: '8192',  label: '8192' },
      { value: '16384', label: '16384' },
    ];
    el.innerHTML = `

      {
        id: "learn-glass",
        title: "The mesh that isn\u2019t",
        main: "The cube has 6 shell triangles and nothing inside — no glass, no lattice. The image is rebuilt every frame inside the fragment shader. For each pixel a ray marches through a signed distance field: a function that, given a 3D point, returns the distance to the nearest surface. Hartman\u2019s sphere tracing uses that distance as a safe step size — you can never overshoot. When the distance collapses to near zero, the gradient of the SDF gives the surface normal; Snell\u2019s law <code>n\u2081 sin \u03B8\u2081 = n\u2082 sin \u03B8\u2082</code> refracts the ray inward, and Schlick\u2019s approximation <code>F\u2080 + (1\u2212F\u2080)(1\u2212cos \u03B8)\u2075</code> sets the Fresnel edge glow. The inner grid is three families of planes: whenever the refracted ray passes close to one, the pixel lights up. Cost scales with screen resolution \u00D7 march steps, not with vertex count.",

        where: "Villeneuve films shot in linear ACES, neon in Blade Runner 2049, the optics of real cameras, every modern engine (<code>UE5</code> Lumen, <code>Unity HDRP</code>)."
      },
      {
        id: "learn-particles",
        title: "4096 points that compute themselves",
        main: "A normal particle system keeps positions in a RAM array and runs a CPU loop every frame. Here the array is a 64\u00D764 <code>RGBA32F</code> texture: each texel is one particle, <code>xyz</code> holds position and <code>w</code> holds age. A separate fragment shader reads the texture, applies the motion rule (curl noise + axis pull + damping) and writes the next texture. Two textures alternate — ping-pong. The CPU never touches a coordinate. This is GPGPU: the GPU used as a massively parallel calculator, not a rasterizer. 64\u00B2 = 4096 is a power of two on purpose: GPUs execute threads in warps of 32 or 64, and a power-of-two texture leaves no idle lanes. Push the texture to 256\u00B2 and you\u2019re running 65k particles on the same silicon.",
        where: "cloth and fluid (<code>FLIP</code>, <code>PBD</code>) in game engines, compute shaders in UE5 and Unity, and — less obviously — deep learning: a matrix multiply inside a transformer is, architecturally, a fragment shader over textures."

        main: "Real aurora is ionization of atomic oxygen near 100 km altitude: solar-wind electrons spiral down Earth\u2019s magnetic field, collide with O, and knock out a green photon at 557.6 nm. Here the look comes from 6 transparent <code>TubeGeometry</code> ribbons with fBm layered on top — fractional Brownian motion, a sum of Perlin simplex noise across octaves. Octave 1 is a big slow wave. Octave 2 has half the wavelength, twice the frequency, half the amplitude. Three to five octaves (<code>\u03A3 a\u2099\u00B7noise(x\u00B7f\u207F)</code> with <code>a\u2099 = 1/2\u207F</code>) give the visual of wind rippling through fabric — the same formula underneath clouds, fire, ocean waves, and Minecraft terrain. In rainbow mode the vertical axis gets an HSV hue sweep, blended onto the base tone with <code>smoothstep</code>.",

<!-- Three.js 3D WebGL Scene -->
<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
  import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
  import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';

  // === Scene configuration ===
  const BRAND_COLOR = '#d49c4d';

  const canvas = document.getElementById('webgl');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  // Camera: FOV=45
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0.5, 8);
  camera.lookAt(0, 0, 0);

  // Renderer configuration
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: false,
    powerPreference: 'high-performance',
    premultipliedAlpha: false,
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.65;

  // Post-processing: bloom
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  // Bloom configuration
  // Slightly increased strength to compensate for missing 5-level custom bloom
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.3,   // strength
    0.5,   // radius (wider for soft atmospheric glow)
    0.15   // threshold
  );
  composer.addPass(bloomPass);

  // === Fluid Simulation (cursor-driven distortion) ===
  const SIM_RES = 128;
  const fluidTexelSize = new THREE.Vector2(1.0 / SIM_RES, 1.0 / SIM_RES);

  const fluidRTOpts = {
    type: THREE.FloatType,
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat,
    depthBuffer: false,
    stencilBuffer: false,
  };
  let fluidDensityA = new THREE.WebGLRenderTarget(SIM_RES, SIM_RES, fluidRTOpts);
  let fluidDensityB = new THREE.WebGLRenderTarget(SIM_RES, SIM_RES, fluidRTOpts);

  const fluidQuadGeo = new THREE.PlaneGeometry(2, 2);
  const fluidScene = new THREE.Scene();
  const fluidCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const splatMaterial = new THREE.ShaderMaterial({
    uniforms: {
      uTarget: { value: null },
      point: { value: new THREE.Vector2(0.5, 0.5) },
      color: { value: new THREE.Vector3(0, 0, 0) },
      radius: { value: 0.002 },
      texelSize: { value: fluidTexelSize },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D uTarget;
      uniform vec2 point;
      uniform vec3 color;
      uniform float radius;
      void main() {
        vec4 base = texture2D(uTarget, vUv);
        vec2 d = vUv - point;
        float splat = exp(-dot(d, d) / radius);
        base.xyz += color * splat;
        gl_FragColor = base;
      }
    `,
  });

  const advectMaterial = new THREE.ShaderMaterial({
    uniforms: {
      uVelocity: { value: null },
      uSource: { value: null },
      texelSize: { value: fluidTexelSize },
      dt: { value: 0.016 },
      dissipation: { value: 0.985 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D uVelocity;
      uniform sampler2D uSource;
      uniform vec2 texelSize;
      uniform float dt;
      uniform float dissipation;
      void main() {
        vec2 vel = texture2D(uVelocity, vUv).xy;
        vec2 coord = vUv - vel * dt * texelSize * 5.0;
        gl_FragColor = texture2D(uSource, coord) * dissipation;
      }
    `,
  });

  const fluidQuad = new THREE.Mesh(fluidQuadGeo, splatMaterial);
  fluidScene.add(fluidQuad);

  // fluidActive: stays true for ~5 s after last mouse move so dissipation finishes,
  // then advection is skipped entirely to save a GPU blit per frame.
  const fluidMouse = { x: 0.5, y: 0.5, prevX: 0.5, prevY: 0.5, dx: 0, dy: 0, moved: false, lastMoveTime: -9999 };
  // Mouse input for fluid splat removed.

  function fluidBlit(mat, target) {
    fluidQuad.material = mat;
    renderer.setRenderTarget(target);
    renderer.render(fluidScene, fluidCamera);
    renderer.setRenderTarget(null);
  }

  function updateFluidSim() {
    const currentRT = renderer.getRenderTarget();
    const currentAutoClear = renderer.autoClear;
    renderer.autoClear = true;

    if (fluidMouse.moved) {
      fluidMouse.moved = false;
      const speed = Math.sqrt(fluidMouse.dx * fluidMouse.dx + fluidMouse.dy * fluidMouse.dy);
      if (speed > 0.0001) {
        const splatForce = 5000; // mouse effects removed; branch unreachable
        splatMaterial.uniforms.uTarget.value = fluidDensityA.texture;
        splatMaterial.uniforms.point.value.set(fluidMouse.x, fluidMouse.y);
        splatMaterial.uniforms.color.value.set(
          fluidMouse.dx * splatForce,
          fluidMouse.dy * splatForce,
          speed * splatForce

        splatMaterial.uniforms.radius.value = 0.004;
        fluidBlit(splatMaterial, fluidDensityB);
        [fluidDensityA, fluidDensityB] = [fluidDensityB, fluidDensityA];

    const fluidAge = performance.now() - fluidMouse.lastMoveTime;

      advectMaterial.uniforms.uSource.value = fluidDensityA.texture;
      advectMaterial.uniforms.dissipation.value = 0.985;
      fluidBlit(advectMaterial, fluidDensityB);
      [fluidDensityA, fluidDensityB] = [fluidDensityB, fluidDensityA];

    renderer.autoClear = currentAutoClear;
    renderer.setRenderTarget(currentRT);

  // Distortion ShaderPass — chromatic + barrel refraction through iridescence LUT
  const fluidDistortionShader = {
    uniforms: {
      tDiffuse: { value: null },
      fluidMap: { value: fluidDensityA.texture },
      pixelSize: { value: new THREE.Vector2(1.0 / window.innerWidth, 1.0 / window.innerHeight) },
      uDistortScale: { value: 1.0 },
      uDiffractScale: { value: 1.0 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D tDiffuse;
      uniform sampler2D fluidMap;
      uniform vec2 pixelSize;
      uniform float uDistortScale;
      uniform float uDiffractScale;

      void main() {
        vec2 uv = vUv;
        vec2 duv = texture2D(fluidMap, uv).xy * 5e-4 * uDistortScale;
        vec2 fc = uv - 0.5;
        vec2 barrel2 = uv * (1.0 - uv);

          uv -= dir * 4.;
          vec3 weight = vec3(1.);
          for (float i = 0.; i < 8.; i++) {
            uv += dir;
            vec3 hue = vec3(
              abs(fract(i/8. * 6. - 3.) - 1.) - 1.,
              2. - abs(fract(i/8. * 6. - 2.) - 2.),

            color += texture2D(tDiffuse, uv).rgb * hue;
            weight += hue;
          }
          color /= weight;
        }
        gl_FragColor = vec4(color, 1.);
      }
    `,
  };

  // === SDF Shape Library ===
  const SDF_FUNCTIONS = {
    cube: `
      float shapeSDF(vec3 p) {
        vec3 d = abs(p) - SIZE + RAD;
        return length(max(d, 0.0)) - RAD + min(max(d.x, max(d.y, d.z)), 0.0);
      }
      vec3 shapeNormal(vec3 p) {
        return sign(p) * normalize(max(abs(p) - SIZE, 0.0));
      }
      float shapeIntersect(vec3 ro, vec3 rd) {
        vec3 m = 1.0 / rd;
        vec3 n = m * ro;
        vec3 k = abs(m) * (SIZE + RAD);
        vec3 t1 = -n - k;
        vec3 t2 = -n + k;
        float tN = max(max(t1.x, t1.y), t1.z);
        float tF = min(min(t2.x, t2.y), t2.z);

      uniform float glowWidth;
      uniform vec3 lightColor;
      uniform float complexity;

        vec3 n = m * ro;
        vec3 k = abs(m) * (size + rad);
        vec3 t1 = -n - k;
        vec3 t2 = -n + k;
        float tN = max(max(t1.x, t1.y), t1.z);
        float tF = min(min(t2.x, t2.y), t2.z);
        if (tN > tF || tF < 0.0) return -1.0;
        return tN > 0.0 ? tN : tF;

        return 0.5 + 0.5 * cos(6.28318 * (t / lambda + uIridHue));

        float bestV = 20.0;

      }

      let gx, gy;
      if (rot === 90) { gx = e.beta;  gy = -e.gamma; }
      else if (rot === -90 || rot === 270) { gx = -e.beta; gy = e.gamma; }
      else if (rot === 180) { gx = -e.gamma; gy = -(e.beta - 45); }
      else { gx = e.gamma;  gy = e.beta - 45; } // portrait default
      gx = Math.max(-30, Math.min(30, gx));
      gy = Math.max(-30, Math.min(30, gy));
      tx = window.innerWidth  * (0.5 + gx / 60);
      ty = window.innerHeight * (0.5 + gy / 60);
      if (!hasSample) { cx = tx; cy = ty; hasSample = true; }
      active = true;
    }

    function attach() {
      window.addEventListener('deviceorientation', onOrientation, { passive: true });
    }

    const needsPermission = typeof DeviceOrientationEvent !== 'undefined'
      && typeof DeviceOrientationEvent.requestPermission === 'function';

    if (!needsPermission) { attach(); return; }

    const btn = document.createElement('button');
    btn.textContent = 'Enable tilt';
    btn.setAttribute('aria-label', 'Enable gyroscope tilt control');
    btn.style.cssText = [
      'position:fixed',
      'bottom:24px',
      'left:50%',
      'transform:translateX(-50%)',
      'padding:10px 18px',
      'background:rgba(212,156,77,0.92)',
      'color:#0b0b0b',
      'border:none',
      'border-radius:999px',
      'font-family:Inter,system-ui,sans-serif',
      'font-size:13px',
      'font-weight:500',
      'letter-spacing:0.02em',
      'z-index:9999',
      'cursor:pointer',
      'box-shadow:0 4px 20px rgba(0,0,0,0.4)',
      'backdrop-filter:blur(6px)'
    ].join(';');
    btn.addEventListener('click', async () => {
      try {
        const res = await DeviceOrientationEvent.requestPermission();
        if (res === 'granted') attach();
      } catch (_) { /* user denied or unsupported */ }
      btn.remove();
    });
    if (document.body) document.body.appendChild(btn);
    else window.addEventListener('DOMContentLoaded', () => document.body.appendChild(btn));
  })();
</script>

</body>
</html>
